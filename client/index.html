<!doctype html>
<html lang="es-PE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO básico -->
    <meta name="robots" content="index, follow" />
    <meta http-equiv="content-language" content="es-PE" />
    <meta name="theme-color" content="#e6e0e0" />
    <link rel="canonical" href="https://www.zincelideas.com" />
    <link rel="alternate" hreflang="es-PE" href="https://www.zincelideas.com" />

    <!-- Anti-FOUC: aplica el tema antes de que React monte -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("zincel-theme");
          var isDark = t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) {
            document.documentElement.classList.add("dark");
            document.documentElement.style.colorScheme = "dark";
          }
        } catch (e) {}
      })();
    </script>

    <!-- Google Tag Manager (optimizado) -->
    <script>
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-WW5VV7WG");
    </script>

    <!-- Preconnect críticos -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fuente Inter (no bloqueante) -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap"
      as="style"
      onload="this.rel = 'stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap"
      />
    </noscript>

    <!-- Fuentes Hero WorldMap -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,400&family=Hanken+Grotesk:wght@300;400;500&display=swap"
      as="style"
      onload="this.rel = 'stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,400&family=Hanken+Grotesk:wght@300;400;500&display=swap"
      />

    <!-- Favicons -->
    <link rel="icon" href="/favicon/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" href="/favicon/favicon-16x16.png" sizes="16x16" />
    <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png" sizes="180x180" />

    <script>
  (function () {
    try {
      var v = localStorage.getItem("zincel-theme");
      var dark = v === "dark" ||
        ((v === null || v === "system") &&
         matchMedia("(prefers-color-scheme: dark)").matches);
      if (dark) {
        document.documentElement.classList.add("dark");
        document.documentElement.style.colorScheme = "dark";
      }
    } catch (e) {}
  })();
</script>

    <!-- React bundle (defer implícito en module) -->
    <script type="module" crossorigin src="/src/main.tsx"></script>
  </head>
